portrait_alt: Clara Holm
bio: >-
  Clara Holm er dokumentarfotograf baseret i København. Gennem sine billeder
  undersøger hun hverdagslivets stille øjeblikke — de mellemrum, der opstår, når
  folk tror, ingen ser på dem.


  Hendes arbejde har ført hende til gader og baggårde, havne og parker,
  togstationer og markeder. Det er i disse rum, at hun finder de historier, der
  ellers forbliver ufortalt.


  Siden 2018 har hun arbejdet som freelance fotograf med fokus på social
  dokumentar og portræt. Hun har udstillet på Fotografisk Center, Politikens Hus
  og Dokk1 i Aarhus.
